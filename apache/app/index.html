<!DOCTYPE html>
<html lang="es">

<head>
    <title>Industrial Fleets</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/index.js"></script>
</head>

<body>

    <h1>Bienvenido a Industrial Fleets, tu lugar de compra de vehículos industriales</h1>

    <!-- Formulario de inicio de sesión -->
    <section id="loginSection">
        <form id="form">
            <h1>Iniciar sesión</h1>

            <div id="formCampos">
                <input type="text" id="email" placeholder="Email" required><br>
                <input type="password" id="password" placeholder="Contraseña" required><br>
            </div>

            <button id="formButton" type="submit">Iniciar sesión</button>
        </form>
    </section>

    <div id="contenido"></div>

    <!-- Botón redireccion registro -->
    <h1>¿No tienes cuenta? Regístrate aquí</h1>
    <div id="auth-buttons">
        <button id="registerBtn">Registrarse</button>
    </div>

</body>

</html>
